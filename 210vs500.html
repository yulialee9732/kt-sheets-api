    <script>
      // Get the element with id="defaultOpen" and click on it
      document.getElementById("defaultOpen").click();
      
      function openPage(pageName, elmnt, color) {
        // Hide all elements with class="tabcontent" by default */
        var i, tabcontent, tablinks;
        tabcontent = document.getElementsByClassName("tabcontent");
        for (i = 0; i < tabcontent.length; i++) {
          tabcontent[i].style.display = "none";
        }

        // Remove the background color of all tablinks/buttons
        tablinks = document.getElementsByClassName("tablink");
        for (i = 0; i < tablinks.length; i++) {
          tablinks[i].style.backgroundColor = "";
        }

        // Show the specific tab content
        document.getElementById(pageName).style.display = "block";

        // Add the specific color to the button used to open the tab content
        elmnt.style.backgroundColor = color;
      }
    </script>

    <script>
      
      let samplesInner = document.querySelector('#samples-selected');
      let samplesBlock = samplesInner.querySelectorAll('.selected');

      document.querySelectorAll('.detail-open').forEach(product =>{
          product.onclick = () =>{
            samplesInner.style.display = 'flex';
            let name = product.getAttribute('data-name');
            samplesBlock.forEach(preview =>{
              let target = preview.getAttribute('data-target');
              if(name == target){
                preview.classList.add('active');
                preview.style.width= '60rem';

              }
            });
          };
      });

      samplesBlock.forEach(close =>{
        close.querySelector('.fa-times').onclick = () =>{
          close.classList.remove('active');
          samplesInner.style.display = 'none';
        };
        document.querySelector('.sl-bg').onclick = () =>{
          console.log("work work")
          document.querySelector("#sl1").classList.remove('active');
          document.querySelector("#sl2").classList.remove('active');
          samplesInner.style.display = 'none';
        };
      });


      // 210샘플영상
      var day210B = document.querySelector("#day210-2")
      var day210btnB = document.querySelector("#day210button-2")
      var day210 = document.querySelector("#day210")
      var night210 = document.querySelector("#night210")
      var day210btn = document.querySelector("#day210button")
      var night210btn = document.querySelector("#night210button")
      function dayCam210(){ //매장
        day210.classList.remove("hidden");
        night210.classList.add("hidden");
        day210B.classList.add("hidden");
        day210btn.style.backgroundColor = "#2196F3";
        day210btn.style.color = "#fff";
        night210btn.style.backgroundColor = "#fff";
        night210btn.style.color = "#444";
        day210btnB.style.backgroundColor = "#fff";
        day210btnB.style.color = "#444";
      }
      function dayCam210B(){  //카페 낮
        day210B.classList.remove("hidden");
        night210.classList.add("hidden");
        day210.classList.add("hidden");
        day210btnB.style.backgroundColor = "#2196F3";
        day210btnB.style.color = "#fff";
        day210btn.style.backgroundColor = "#fff";
        day210btn.style.color = "#444";
        night210btn.style.backgroundColor = "#fff";
        night210btn.style.color = "#444";
      }
      function nightCam210(){  //카페 밤
        night210.classList.remove("hidden");
        day210.classList.add("hidden");
        day210B.classList.add("hidden");
        night210btn.style.backgroundColor = "#2196F3";
        night210btn.style.color = "#fff";
        day210btn.style.backgroundColor = "#fff";
        day210btn.style.color = "#444";
        day210btnB.style.backgroundColor = "#fff";
        day210btnB.style.color = "#444";
      }


      // 구입형500샘플영상
      var day500C = document.querySelector("#day500-3")
      var night500C = document.querySelector("#night500-3")
      var day500btnC = document.querySelector("#day500button-3")
      var night500btnC = document.querySelector("#night500button-3")
      function dayCam500C(){  //무인매장
        day500C.classList.remove("hidden");
        night500C.classList.add("hidden");
        day500btnC.style.backgroundColor = "#2196F3";
        day500btnC.style.color = "#fff";
        night500btnC.style.backgroundColor = "#fff";
        night500btnC.style.color = "#444";
      }
      function nightCam500C(){  //스터디 카페
        night500C.classList.remove("hidden");
        day500C.classList.add("hidden");
        night500btnC.style.backgroundColor = "#2196F3";
        night500btnC.style.color = "#fff";
        day500btnC.style.backgroundColor = "#fff";
        day500btnC.style.color = "#444";
      }

    </script>
